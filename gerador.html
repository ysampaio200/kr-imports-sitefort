<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Catálogo - KR Imports</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #4A3A3A; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; margin-top: 10px;}
        button:hover { background: #6b5656; }
        .btn-download { background: #28a745; margin-top: 20px; font-weight: bold;}
        .btn-download:hover { background: #218838; }
        ul { list-style: none; padding: 0; }
        li { background: #eee; margin: 5px 0; padding: 10px; display: flex; justify-content: space-between; align-items: center;}
        .remover { background: red; padding: 5px 10px; width: auto; margin: 0;}
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #4A3A3A;">KR Imports - Adicionar Perfumes</h2>
    
    <input type="text" id="nome" placeholder="Nome do Perfume (ex: Asad Lattafa)">
    <input type="text" id="preco" placeholder="Preço (ex: R$ 350,00)">
    <input type="text" id="imagem" placeholder="Nome do arquivo da foto (ex: asad.jpg)">
    
    <button onclick="adicionarProduto()">+ Adicionar à Lista</button>

    <h3 style="margin-top: 30px;">Catálogo Atual:</h3>
    <ul id="lista"></ul>

    <button class="btn-download" onclick="baixarArquivo()">⬇️ Baixar Arquivo produtos.js</button>
    <p style="font-size: 12px; color: #666; text-align: center;">Salve este arquivo na pasta do seu site e substitua o antigo.</p>
</div>

<script>
    // Recupera produtos salvos no seu navegador local ou cria uma lista vazia
    let produtos = JSON.parse(localStorage.getItem('kr_produtos')) || [];

    function atualizarTela() {
        const lista = document.getElementById('lista');
        lista.innerHTML = '';
        produtos.forEach((p, index) => {
            lista.innerHTML += `<li>${p.nome} - ${p.preco} <button class="remover" onclick="removerProduto(${index})">X</button></li>`;
        });
        localStorage.setItem('kr_produtos', JSON.stringify(produtos));
    }

    function adicionarProduto() {
        const nome = document.getElementById('nome').value;
        const preco = document.getElementById('preco').value;
        const imagem = document.getElementById('imagem').value;

        if(!nome || !preco || !imagem) return alert("Preencha todos os campos!");

        produtos.push({ nome, preco, imagem });
        document.getElementById('nome').value = '';
        document.getElementById('preco').value = '';
        document.getElementById('imagem').value = '';
        atualizarTela();
    }

    function removerProduto(index) {
        produtos.splice(index, 1);
        atualizarTela();
    }

    function baixarArquivo() {
        if(produtos.length === 0) return alert("Adicione pelo menos um produto!");
        
        // Cria o código javascript que a sua loja vai ler
        const conteudo = `const produtosData = ${JSON.stringify(produtos, null, 4)};`;
        const blob = new Blob([conteudo], { type: "text/javascript" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = 'produtos.js';
        a.click();
    }

    atualizarTela();
</script>
</body>
</html>
